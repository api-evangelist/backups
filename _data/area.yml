features:
- name: Backup Job Orchestration
  description: Backup APIs schedule, trigger, and monitor backup jobs across servers,
    virtual machines, databases, SaaS tenants, and endpoints, with policy-driven recurrence
    and dependency management.
- name: Recovery Point Management
  description: APIs enumerate and inspect recovery points (snapshots, restore points,
    incremental chains) so that operators and automation can pick the right point
    in time for granular or full recovery.
- name: Retention and Lifecycle Policies
  description: Backup platforms expose retention rules, GFS (grandfather-father-son)
    schedules, and lifecycle transitions that move data between hot, cold, and archive
    tiers like S3 Glacier or Azure Archive.
- name: Immutability and Ransomware Protection
  description: Modern backup APIs configure object lock, WORM storage, air-gapped
    copies, and anomaly detection to defend recovery data against ransomware and insider
    tampering.
- name: SaaS Data Backup
  description: SaaS-focused providers like Rewind, OwnBackup, Spanning, and Backupify
    back up Salesforce, Microsoft 365, Google Workspace, GitHub, Shopify, and other
    tenant data through vendor APIs.
- name: Disaster Recovery Orchestration
  description: DR APIs from AWS, Azure, VMware, and Veeam coordinate failover, failback,
    runbook execution, and recovery validation across primary and secondary sites
    or cloud regions.
- name: Cross-Cloud and Hybrid Targets
  description: Backup APIs write to a mix of on-prem appliances, object storage (Backblaze
    B2, Wasabi, S3, Azure Blob), and cloud-native services, enabling 3-2-1 strategies
    across providers.
use_cases:
- name: Ransomware Recovery
  description: Organizations use backup APIs to identify the most recent clean recovery
    point after a ransomware event and orchestrate restore of affected VMs, files,
    and databases at scale.
- name: SaaS Tenant Protection
  description: SMBs and enterprises run SaaS backup APIs to protect Microsoft 365
    mailboxes, SharePoint sites, Google Workspace drives, and Salesforce records against
    accidental deletion and malicious actors.
- name: Cross-Region Disaster Recovery
  description: Operators use APIs like AWS Backup, Azure Site Recovery, and Veeam
    to replicate workloads across regions and execute scheduled DR drills with measurable
    RPO and RTO.
- name: Long-Term Archival and Compliance
  description: Regulated industries push immutable backup copies to archive tiers
    (S3 Glacier, Azure Archive, B2) via backup APIs to satisfy retention mandates
    under HIPAA, SOX, GDPR, and FINRA.
- name: Endpoint and Remote Worker Backup
  description: Endpoint backup APIs from Druva, Acronis, and Carbonite protect laptops
    and remote devices and let IT centrally restore files after device loss or compromise.
- name: Database and VM Snapshot Automation
  description: Platform engineers script database, VM, and volume snapshots via cloud-native
    APIs (Amazon DLM, Azure Backup, NetApp) and integrate them into CI/CD and pre-change
    checkpoints.
integrations:
- name: Veeam
  description: Backup, replication, and disaster recovery platform for VMs, physical
    servers, cloud workloads, and Microsoft 365 with a comprehensive REST API.
- name: Commvault
  description: Enterprise data protection and backup platform with REST APIs for jobs,
    clients, storage policies, and disaster recovery orchestration.
- name: Rubrik
  description: Cloud data management and backup platform with REST APIs covering SLA
    domains, snapshots, recovery, and ransomware investigation.
- name: Cohesity
  description: Hyperconverged data protection and backup platform with REST APIs for
    protection jobs, sources, views, and recovery operations.
- name: AWS Backup
  description: Centralized, policy-based AWS service that automates backup of EBS,
    RDS, DynamoDB, EFS, S3, and other AWS resources via API and IaC.
- name: Microsoft Azure Backup
  description: Azure-native backup service that protects VMs, files, SQL, and SAP
    HANA workloads, with REST APIs for vaults, policies, and recovery points.
- name: Druva
  description: SaaS-delivered data protection for endpoints, data centers, and cloud
    workloads with APIs for backups, restores, and compliance reporting.
- name: Backblaze B2
  description: Low-cost cloud object storage commonly used as a backup target via
    S3-compatible APIs, supporting object lock and lifecycle rules.
